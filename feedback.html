<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Page</title>
    <link rel="stylesheet" href="styles.css"> <!-- Link to CSS file -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="container">
        <h1>We Value Your Feedback</h1>
        <p>Let us know your thoughts, suggestions, or any issues you encountered.</p>

        <form action="https://api.staticman.net/v3/entry/github/prgrmcode/prgrmcode.github.io/main/comments"
            method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="comment" placeholder="Your Comment" required></textarea>
            <button type="submit">Submit Comment</button>
        </form>

        <div id="thankYouMessage" style="display: none;">Thank you for your feedback!</div>

        <div class="comments-section">
            <h2>Public Feedback</h2>
            <div id="commentsContainer">
                <!-- User comments will be dynamically loaded here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script> <!-- Link to JavaScript file -->
</body>

</html>
